<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekonvalescence 180 Dní</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #07090e; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .day-content { transition: all 0.3s ease-in-out; max-height: 0; overflow: hidden; }
        .active .day-content { max-height: 1500px; padding: 1.5rem; }
        .active .chevron { transform: rotate(180deg); }
        .progress-fill { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <section class="glass rounded-3xl p-6 mb-8 text-center">
            <h2 class="text-sm font-black tracking-[0.2em] text-blue-400 mb-4 uppercase">Cesta k zotavení (6 měsíců)</h2>
            <div class="relative w-full bg-slate-800 h-4 rounded-full overflow-hidden mb-2">
                <div id="longTermProgress" class="progress-fill absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-emerald-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs text-slate-500 font-bold">
                <span id="startDateDisplay">START</span>
                <span id="daysRemaining">NAČÍTÁNÍ...</span>
                <span>CÍL (6 MĚS.)</span>
            </div>
        </section>

        <div class="flex items-center justify-between mb-8 px-2">
            <div>
                <h1 id="currentDate" class="text-3xl font-extrabold tracking-tight">Pondělí, 24. února</h1>
                <p class="text-emerald-500 font-bold text-sm">Dnešní cíle:</p>
            </div>
            <div class="text-right">
                <div class="text-4xl">🔥</div>
            </div>
        </div>

        <div id="planContainer" class="space-y-4">
            </div>

        <section class="mt-12">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-pen-nib text-blue-400"></i> Dnešní report / poznámka
            </h3>
            <textarea id="dailyNote" oninput="saveNote()" placeholder="Jak se dnes cítíš? Bolelo koleno? Jak šel box..." 
                class="w-full h-32 bg-slate-900/50 border border-slate-800 rounded-2xl p-4 text-slate-300 focus:border-blue-500 focus:outline-none transition-all"></textarea>
        </section>
    </div>

    <script>
        const plan = [
            { day: "Pondělí", title: "Hrudník + Core + Box", gym: ["Kliky (4 série)", "Tlaky vleže (jednoručky)", "Plank (3x30-60s)", "Boxování vsedě (15 min)"], diet: ["Vejce + slanina", "Tvaroh (250g) + borůvky", "Protein smoothie", "Omeleta se šunkou"] },
            { day: "Úterý", title: "Záda + Biceps", gym: ["Přítahy v předklonu", "Veslování vsedě", "Biceps zdvihy", "Izometrie v tahu", "20 min box / lehce"], diet: ["Standardní režim", "Tvaroh + ovoce", "Smoothie", "Omeleta"] },
            { day: "Středa", title: "Core + Zdravá noha", gym: ["Dřepy na jedné noze (opora)", "Sedni-stoupni", "Plank (4x)", "15 min kardio"], diet: ["Vejce + zelenina", "Tvaroh + chia", "Smoothie", "Lehká večeře"] },
            { day: "Čtvrtek", title: "Ramena + Core", gym: ["Tlaky nad hlavu", "Upažování", "Kliky o židli", "Plank (3x)", "15-20 min box"], diet: ["Vejce + slanina", "Tvaroh", "Protein", "Omeleta"] },
            { day: "Pátek", title: "Full Body (Lehčí)", gym: ["Kliky (3 série)", "Biceps + Triceps", "Zanožování vleže", "Core komplex"], diet: ["Pravidelná strava", "Vysoký protein", "Ovoce", "Ryba/Omeleta"] },
            { day: "Sobota", title: "Dlouhé Kardio + Core", gym: ["30-40 min Box / Intervaly", "Zkracovačky (3x)", "Side Plank (3x)", "Procházka"], diet: ["Vejce + slanina", "Tvaroh", "Protein", "Kvalitní večeře"] },
            { day: "Neděle", title: "Regenerace / Volno", gym: ["Procházka", "Klidový režim", "Příprava na týden"], diet: ["Volnější režim - doplň energii"] }
        ];

        // START DATUM (Nastav si tady den, kdy jsi začal - formát RRRR-MM-DD)
        const startDate = new Date('2024-02-15'); 
        const targetDate = new Date(startDate);
        targetDate.setMonth(targetDate.getMonth() + 6);

        function updateProgress() {
            const today = new Date();
            const total = targetDate - startDate;
            const current = today - startDate;
            let percent = Math.floor((current / total) * 100);
            percent = Math.max(0, Math.min(100, percent)); // omezit 0-100

            document.getElementById('longTermProgress').style.width = percent + '%';
            document.getElementById('startDateDisplay').innerText = startDate.toLocaleDateString('cs-CZ');
            
            const diffTime = Math.abs(targetDate - today);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('daysRemaining').innerText = `ZBÝVÁ ${diffDays} DNÍ`;
            document.getElementById('currentDate').innerText = today.toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function render() {
            const container = document.getElementById('planContainer');
            const checks = JSON.parse(localStorage.getItem('rekon-checks-v4')) || {};
            
            container.innerHTML = plan.map((d, idx) => `
                <div class="glass rounded-3xl overflow-hidden" id="card-${idx}">
                    <button onclick="toggleDay(${idx})" class="w-full p-5 flex justify-between items-center hover:bg-white/5 transition-all">
                        <div class="text-left">
                            <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${d.day}</span>
                            <h3 class="text-lg font-bold">${d.title}</h3>
                        </div>
                        <i class="fas fa-chevron-down chevron text-slate-600 transition-transform"></i>
                    </button>
                    <div class="day-content bg-slate-900/30">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <h4 class="text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest">💪 Cvičení</h4>
                                <div class="space-y-2">
                                    ${d.gym.map((item, i) => createCheck(`g-${idx}-${i}`, item, checks)).join('')}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest">🍎 Strava</h4>
                                <div class="space-y-2">
                                    ${d.diet.map((item, i) => createCheck(`d-${idx}-${i}`, item, checks)).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('dailyNote').value = localStorage.getItem('rekon-note-' + getTodayKey()) || "";
        }

        function createCheck(id, text, checks) {
            const isChecked = checks[id] ? 'checked' : '';
            return `
                <div class="flex items-center gap-3 group">
                    <input type="checkbox" id="${id}" ${isChecked} onchange="saveCheck('${id}')" 
                        class="w-5 h-5 rounded-lg border-slate-700 bg-slate-800 text-blue-500 focus:ring-0 cursor-pointer">
                    <label for="${id}" class="text-sm text-slate-400 cursor-pointer group-hover:text-slate-200 transition-colors">${text}</label>
                </div>
            `;
        }

        window.toggleDay = (idx) => {
            const el = document.getElementById(`card-${idx}`);
            const isActive = el.classList.contains('active');
            document.querySelectorAll('[id^="card-"]').forEach(c => c.classList.remove('active'));
            if (!isActive) el.classList.add('active');
        }

        window.saveCheck = (id) => {
            const checks = JSON.parse(localStorage.getItem('rekon-checks-v4')) || {};
            checks[id] = !checks[id];
            localStorage.setItem('rekon-checks-v4', JSON.stringify(checks));
        }

        window.saveNote = () => {
            const note = document.getElementById('dailyNote').value;
            localStorage.setItem('rekon-note-' + getTodayKey(), note);
        }

        function getTodayKey() { return new Date().toISOString().split('T')[0]; }

        updateProgress();
        render();
    </script>
</body>
</html>
